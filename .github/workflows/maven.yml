name: Java CI with Maven and Selenium

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17' # Укажите вашу версию Java
          distribution: 'temurin'
          cache: maven

      - name: Run tests with Maven
        run: mvn -B test
